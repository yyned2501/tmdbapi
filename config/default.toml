# TMDB API 配置
[tmdb]
api_key = ""
read_access_token = ""
base_url = "https://api.themoviedb.org/3"
language = "zh-CN"
include_adult = true

# 数据库配置
[database]
url = "postgresql+asyncpg://postgres:postgres@localhost:5432/tmdb_api"

# 日志配置
[app_logger]
level = "INFO"
file = "logs/app.log"

# 代理配置
[proxy]
enabled = false
http = "http://127.0.0.1:7890"
https = "http://127.0.0.1:7890"
